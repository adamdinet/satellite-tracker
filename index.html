<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Satellite Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#e0e0e0;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;width:100vw}
#canvas-container{position:absolute;inset:0}
canvas{display:block}
#panel{position:absolute;top:0;left:0;width:300px;height:100vh;background:rgba(4,8,18,0.92);backdrop-filter:blur(8px);border-right:1px solid rgba(0,160,255,0.2);display:flex;flex-direction:column;z-index:10}
#panel-header{padding:14px 16px;border-bottom:1px solid rgba(0,160,255,0.2);background:rgba(0,20,50,0.6)}
#panel-header h1{font-size:15px;color:#00aaff;letter-spacing:2px;text-transform:uppercase}
#search-wrap{padding:10px 12px;border-bottom:1px solid rgba(0,160,255,0.15)}
#search-wrap input{width:100%;padding:7px 10px;background:rgba(0,30,70,0.8);border:1px solid rgba(0,160,255,0.3);border-radius:5px;color:#dde;font-size:12px;outline:none}
#filter-bar{padding:8px 10px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid rgba(0,160,255,0.15)}
.fbtn{padding:3px 9px;border-radius:10px;font-size:10px;cursor:pointer;border:1px solid;transition:all .15s;user-select:none}
/* Time Control Styling */
#time-control-wrap{padding:12px;border-bottom:1px solid rgba(0,160,255,0.15);background:rgba(0,10,30,0.4)}
.t-label{display:flex;justify-content:space-between;font-size:10px;color:#00aaff;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
#time-slider{width:100%;cursor:pointer;height:4px;accent-color:#00aaff}
#sat-list{flex:1;overflow-y:auto}
.sitem{padding:7px 14px;cursor:pointer;border-left:3px solid transparent}
.sitem:hover{background:rgba(0,160,255,0.07)}
#info{position:absolute;bottom:18px;left:310px;width:260px;background:rgba(4,8,18,0.95);border:1px solid rgba(0,160,255,0.3);border-radius:9px;padding:14px;z-index:10;display:none}
#hud{position:absolute;top:14px;right:14px;z-index:10;text-align:right;font-size:10px;color:#3a5060}
#hud-time{color:#00aaff;font-size:13px;font-weight:700}
#loading{position:absolute;inset:0;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.spin{width:44px;height:44px;border:3px solid rgba(0,160,255,0.2);border-top-color:#00aaff;border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><h2 style="color:#00aaff;margin-top:10px">LOADING ORBITAL DATA</h2><div id="load-msg" style="color:#506070;font-size:11px;margin-top:10px">Initializing...</div></div>
<div id="canvas-container"></div>
<div id="panel">
  <div id="panel-header"><h1>🛰 Satellite Tracker</h1></div>
  <div id="search-wrap"><input id="search" type="text" placeholder="Search name or NORAD ID…"/></div>
  <div id="time-control-wrap">
    <div class="t-label"><span>Time Speed</span><span id="speed-val">Real-time</span></div>
    <input type="range" id="time-slider" min="-500" max="500" value="1">
  </div>
  <div id="filter-bar"></div>
  <div id="sat-list"></div>
</div>
<div id="info">
  <span id="info-close" style="float:right;cursor:pointer">✕</span>
  <h2 id="i-name" style="color:#00aaff;font-size:12px;margin-bottom:10px"></h2>
  <div style="font-size:11px">NORAD ID: <span id="i-norad"></span></div>
  <div style="font-size:11px">Altitude: <span id="i-alt"></span></div>
</div>
<div id="hud"><div id="hud-time">--:--:--</div><div id="hud-date"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/satellite.js@4.1.3/dist/satellite.min.js"></script>
<script src="app.js"></script>
</body>
</html>
