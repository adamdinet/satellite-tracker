<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Satellite Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#e0e0e0;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;width:100vw}
#canvas-container{position:absolute;inset:0}
canvas{display:block}

#panel{position:absolute;top:0;left:0;width:300px;height:100vh;background:rgba(4,8,18,0.92);backdrop-filter:blur(8px);border-right:1px solid rgba(0,160,255,0.2);display:flex;flex-direction:column;z-index:10}
#panel-header{padding:14px 16px;border-bottom:1px solid rgba(0,160,255,0.2);background:rgba(0,20,50,0.6)}
#panel-header h1{font-size:15px;color:#00aaff;letter-spacing:2px;text-transform:uppercase}
#panel-header p{font-size:10px;color:#506070;margin-top:3px}

#search-wrap{padding:10px 12px;border-bottom:1px solid rgba(0,160,255,0.15)}
#search-wrap input{width:100%;padding:7px 10px;background:rgba(0,30,70,0.8);border:1px solid rgba(0,160,255,0.3);border-radius:5px;color:#dde;font-size:12px;outline:none}
#search-wrap input:focus{border-color:#00aaff}
#search-wrap input::placeholder{color:#3a5060}

#filter-bar{padding:8px 10px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid rgba(0,160,255,0.15)}
.fbtn{padding:3px 9px;border-radius:10px;font-size:10px;cursor:pointer;border:1px solid;transition:all .15s;user-select:none}

/* NEW: Time Control Styling */
#time-control-wrap{padding:12px;border-bottom:1px solid rgba(0,160,255,0.15);background:rgba(0,10,30,0.4)}
.t-label{display:flex;justify-content:space-between;font-size:10px;color:#00aaff;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
#time-slider{width:100%;cursor:pointer;height:4px;accent-color:#00aaff}

#stats{padding:6px 12px;font-size:10px;color:#506070;border-bottom:1px solid rgba(0,160,255,0.15);display:flex;justify-content:space-between}
#sat-count{color:#00aaff;font-weight:700}

#sat-list{flex:1;overflow-y:auto}
#sat-list::-webkit-scrollbar{width:3px}
#sat-list::-webkit-scrollbar-thumb{background:rgba(0,160,255,0.3);border-radius:2px}
.sitem{padding:7px 14px;cursor:pointer;border-left:3px solid transparent;transition:background .12s}
.sitem:hover{background:rgba(0,160,255,0.07)}
.sitem.sel{background:rgba(0,160,255,0.14);border-left-color:#00aaff}
.sitem .sname{font-size:11px;font-weight:600;color:#b8d4f0}
.sitem .smeta{font-size:9px;color:#4a6070;margin-top:1px}

#info{position:absolute;bottom:18px;left:310px;width:260px;background:rgba(4,8,18,0.95);border:1px solid rgba(0,160,255,0.3);border-radius:9px;padding:14px;z-index:10;display:none}
#info h2{font-size:12px;color:#00aaff;margin-bottom:9px;letter-spacing:1px;padding-right:20px}
.irow{display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px}
.ilbl{color:#506070}
.ival{color:#b8d4f0;font-weight:600;text-align:right;max-width:150px;word-break:break-word}
#info-close{position:absolute;top:9px;right:11px;cursor:pointer;color:#506070;font-size:15px;line-height:1}
#info-close:hover{color:#00aaff}

#hud{position:absolute;top:14px;right:14px;z-index:10;text-align:right;font-size:10px;color:#3a5060;line-height:1.9}
#hud-time{color:#00aaff;font-size:13px;font-weight:700}

#legend{position:absolute;bottom:18px;right:14px;z-index:10;background:rgba(4,8,18,0.88);border:1px solid rgba(0,160,255,0.2);border-radius:7px;padding:10px 14px;font-size:10px}
#legend h3{color:#506070;margin-bottom:7px;font-size:9px;text-transform:uppercase;letter-spacing:1px}
.lrow{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

#loading{position:absolute;inset:0;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#loading h2{color:#00aaff;font-size:17px;margin-bottom:10px;letter-spacing:2px}
#loading p{color:#506070;font-size:11px;margin-top:8px}
.spin{width:44px;height:44px;border:3px solid rgba(0,160,255,0.2);border-top-color:#00aaff;border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#load-msg{color:#3a5060;font-size:11px;margin-top:14px;max-width:280px;text-align:center}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <h2>SATELLITE TRACKER</h2>
  <p>Loading live orbital data…</p>
  <div id="load-msg">Connecting to local server…</div>
</div>

<div id="canvas-container"></div>

<div id="panel">
  <div id="panel-header">
    <h1>🛰 Satellite Tracker</h1>
    <p id="panel-sub">Loading…</p>
  </div>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="Search name or NORAD ID…"/>
  </div>
  
  <div id="time-control-wrap">
    <div class="t-label">
      <span>Time Speed</span>
      <span id="speed-val">Real-time</span>
    </div>
    <input type="range" id="time-slider" min="-1000" max="1000" value="1">
  </div>

  <div id="filter-bar"></div>
  <div id="stats">
    <span>Showing <span id="sat-count">0</span> satellites</span>
    <span id="upd-time"></span>
  </div>
  <div id="sat-list"></div>
</div>

<div id="info">
  <span id="info-close">✕</span>
  <h2 id="i-name"></h2>
  <div class="irow"><span class="ilbl">NORAD ID</span><span class="ival" id="i-norad"></span></div>
  <div class="irow"><span class="ilbl">Type</span><span class="ival" id="i-type"></span></div>
  <div class="irow"><span class="ilbl">Altitude</span><span class="ival" id="i-alt"></span></div>
  <div class="irow"><span class="ilbl">Latitude</span><span class="ival" id="i-lat"></span></div>
  <div class="irow"><span class="ilbl">Longitude</span><span class="ival" id="i-lon"></span></div>
  <div class="irow"><span class="ilbl">Velocity</span><span class="ival" id="i-vel"></span></div>
  <div class="irow"><span class="ilbl">Inclination</span><span class="ival" id="i-inc"></span></div>
  <div class="irow"><span class="ilbl">Period</span><span class="ival" id="i-per"></span></div>
</div>

<div id="hud">
  <div id="hud-time">--:--:--</div>
  <div id="hud-date"></div>
  <div style="margin-top:5px;font-size:9px">Drag · Scroll to zoom · Click satellite</div>
</div>

<div id="legend">
  <h3>Types</h3>
  <div id="legend-body"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/satellite.js@4.1.3/dist/satellite.min.js"></script>
<script src="app.js"></script>
</body>
</html>
